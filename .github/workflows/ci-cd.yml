name: CI/CD

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (only for manual deploy)
        required: false
        type: choice
        options: [dev, prod]
      deploy_target:
        description: What to deploy (auto = detect from last commit)
        required: false
        type: choice
        default: auto
        options: [auto, stack, frontend, all]

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.12.1'
  AWS_REGION: us-east-1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: API smoke tests (local server)
        run: chmod +x scripts/smoke-api.sh && ./scripts/smoke-api.sh

  detect-changes:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.changes.outputs.stack }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            case "${{ inputs.deploy_target }}" in
              stack)
                echo "stack=true" >> "$GITHUB_OUTPUT"
                echo "frontend=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              frontend)
                echo "stack=false" >> "$GITHUB_OUTPUT"
                echo "frontend=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
              all)
                echo "stack=true" >> "$GITHUB_OUTPUT"
                echo "frontend=true" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac
          fi

          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          if [[ "$BASE" == "0000000000000000000000000000000000000000" ]]; then
            echo "stack=true" >> "$GITHUB_OUTPUT"
            echo "frontend=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          stack=false
          frontend=false

          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            case "$file" in
              functions/*|infrastructure/*|scripts/deploy-stack.sh|scripts/smoke-api.sh)
                stack=true
                ;;
              frontend/*)
                frontend=true
                ;;
              pnpm-lock.yaml|package.json|pnpm-workspace.yaml|.github/workflows/ci-cd.yml)
                stack=true
                frontend=true
                ;;
            esac
          done < <(git diff --name-only "$BASE" "$HEAD")

          echo "stack=$stack" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "Stack changes: $stack"
          echo "Frontend changes: $frontend"

  deploy-stack:
    needs: [validate, detect-changes]
    if: |
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.stack == 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/master' && 'prod' || 'dev') }}
    concurrency:
      group: chapterquest-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/master' && 'prod' || 'dev') }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Validate CloudFormation templates
        run: |
          for template in infrastructure/cloudformation/*/template.yaml; do
            echo "Validating ${template}"
            aws cloudformation validate-template --template-body "file://${template}"
          done

      - name: Deploy infrastructure + backend (CloudFormation)
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          else
            ENV="${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}"
          fi
          export ARTIFACTS_BUCKET="${{ vars.ARTIFACTS_BUCKET }}"
          chmod +x scripts/deploy-stack.sh
          ./scripts/deploy-stack.sh "${ENV}"

  deploy-frontend:
    needs: [validate, detect-changes, deploy-stack]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.frontend == 'true' &&
      (needs.deploy-stack.result == 'success' || needs.deploy-stack.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/master' && 'prod' || 'dev') }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Resolve stack outputs
        id: stack
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          else
            ENV="${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}"
          fi
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "chapterquest-root-${ENV}" \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "env=${ENV}" >> "$GITHUB_OUTPUT"
          echo "api_url=${API_URL}" >> "$GITHUB_OUTPUT"
          echo "Using VITE_API_BASE_URL=${API_URL}"

      - name: Build frontend
        run: pnpm --filter @chapterquest/frontend build
        env:
          VITE_API_BASE_URL: ${{ steps.stack.outputs.api_url }}
          VITE_APP_ENV: ${{ steps.stack.outputs.env == 'prod' && 'prod' || 'dev' }}

      - name: Deploy frontend to S3 + CloudFront
        run: |
          ENV="${{ steps.stack.outputs.env }}"
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name "chapterquest-root-${ENV}" \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name "chapterquest-root-${ENV}" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          aws s3 sync frontend/dist/ "s3://${FRONTEND_BUCKET}/" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"

  deploy-summary:
    needs: [detect-changes, deploy-stack, deploy-frontend]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - name: Write deploy summary
        run: |
          {
            echo "## Deploy summary"
            echo
            echo "| Component | Changes detected | Job result |"
            echo "|-----------|------------------|------------|"
            echo "| Stack | \`${{ needs.detect-changes.outputs.stack }}\` | \`${{ needs.deploy-stack.result }}\` |"
            echo "| Frontend | \`${{ needs.detect-changes.outputs.frontend }}\` | \`${{ needs.deploy-frontend.result }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
