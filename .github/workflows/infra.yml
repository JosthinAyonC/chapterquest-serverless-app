name: Infrastructure CI/CD

on:
  push:
    branches: [develop, master]
    paths:
      - 'infrastructure/**'
      - 'scripts/deploy-stack.sh'
      - '.github/workflows/infra.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, prod]

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.12.1'
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || (github.ref == 'refs/heads/master' && 'prod' || 'dev') }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (functions)
        run: pnpm --filter @chapterquest/functions test

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || env.AWS_REGION }}

      - name: Validate CloudFormation templates
        run: |
          for template in infrastructure/cloudformation/*/template.yaml; do
            echo "Validating ${template}"
            aws cloudformation validate-template --template-body "file://${template}"
          done

      - name: Deploy infrastructure
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ inputs.environment }}"
          else
            ENV="${{ github.ref == 'refs/heads/master' && 'prod' || 'dev' }}"
          fi
          export ARTIFACTS_BUCKET="${{ vars.ARTIFACTS_BUCKET }}"
          ./scripts/deploy-stack.sh "${ENV}"
