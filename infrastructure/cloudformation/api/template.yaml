AWSTemplateFormatVersion: '2010-09-09'
Description: ChapterQuest API — HTTP API and Lambda functions

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
  LambdaArtifactsBucket:
    Type: String
  HealthLambdaS3Key:
    Type: String
    Default: auth/handlers/health.zip
  UsersGuestLambdaS3Key:
    Type: String
    Default: users/handlers/guest.zip
  LibraryListLambdaS3Key:
    Type: String
    Default: library/handlers/list.zip
  SessionsLambdaS3Key:
    Type: String
    Default: sessions/handlers/session.zip
  EnableCustomDomain:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
  ApiCertificateArn:
    Type: String
    Default: ''
  CustomApiDomainHost:
    Type: String
    Default: ''
  UsersTableName:
    Type: String
  SessionsTableName:
    Type: String
  LibraryBucketName:
    Type: String
  LibraryPrefix:
    Type: String
    Default: library/
  LibraryCdnDomain:
    Type: String
    Default: ''
    Description: CloudFront domain for library PDFs and covers (no protocol)

Conditions:
  UseCustomDomain: !Equals [!Ref EnableCustomDomain, 'true']

Resources:
  # --- HTTP Lambdas ---

  HealthExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Env}-role-function-health
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HealthFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${Env}-function-health
      Runtime: nodejs22.x
      Handler: auth/handlers/health.handler
      Role: !GetAtt HealthExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          ENV: !Ref Env
      Code:
        S3Bucket: !Ref LambdaArtifactsBucket
        S3Key: !Sub ${Env}/lambdas/${HealthLambdaS3Key}

  UsersGuestExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Env}-role-function-users-guest
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBUsersAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${UsersTableName}

  UsersGuestFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${Env}-function-users-guest
      Runtime: nodejs22.x
      Handler: users/handlers/guest.handler
      Role: !GetAtt UsersGuestExecutionRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          ENV: !Ref Env
          USERS_TABLE: !Ref UsersTableName
      Code:
        S3Bucket: !Ref LambdaArtifactsBucket
        S3Key: !Sub ${Env}/lambdas/${UsersGuestLambdaS3Key}

  LibraryListExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Env}-role-function-library-list
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3LibraryRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub arn:aws:s3:::${LibraryBucketName}
                Condition:
                  StringLike:
                    s3:prefix:
                      - !Ref LibraryPrefix
                      - !Sub ${LibraryPrefix}*
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:HeadObject
                Resource: !Sub arn:aws:s3:::${LibraryBucketName}/${LibraryPrefix}*

  LibraryListFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${Env}-function-library-list
      Runtime: nodejs22.x
      Handler: library/handlers/list.handler
      Role: !GetAtt LibraryListExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          ENV: !Ref Env
          LIBRARY_BUCKET: !Ref LibraryBucketName
          LIBRARY_PREFIX: !Ref LibraryPrefix
          LIBRARY_CDN_DOMAIN: !Ref LibraryCdnDomain
      Code:
        S3Bucket: !Ref LambdaArtifactsBucket
        S3Key: !Sub ${Env}/lambdas/${LibraryListLambdaS3Key}

  SessionsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${Env}-role-function-sessions
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBSessionsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:BatchWriteItem
                Resource:
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SessionsTableName}
                  - !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${SessionsTableName}/index/*

  SessionsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${Env}-function-sessions
      Runtime: nodejs22.x
      Handler: sessions/handlers/session.handler
      Role: !GetAtt SessionsExecutionRole.Arn
      Timeout: 15
      MemorySize: 256
      Environment:
        Variables:
          ENV: !Ref Env
          SESSIONS_TABLE: !Ref SessionsTableName
          LIBRARY_BUCKET: !Ref LibraryBucketName
          LIBRARY_PREFIX: !Ref LibraryPrefix
      Code:
        S3Bucket: !Ref LambdaArtifactsBucket
        S3Key: !Sub ${Env}/lambdas/${SessionsLambdaS3Key}

  # --- HTTP API ---

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${Env}-chapterquest-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        AllowHeaders: ['*']

  HealthIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt HealthFunction.Arn
      PayloadFormatVersion: '2.0'

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /health
      Target: !Sub integrations/${HealthIntegration}

  UsersGuestIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt UsersGuestFunction.Arn
      PayloadFormatVersion: '2.0'

  UsersGuestRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /users/guest
      Target: !Sub integrations/${UsersGuestIntegration}

  LibraryListIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LibraryListFunction.Arn
      PayloadFormatVersion: '2.0'

  LibraryListRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /library
      Target: !Sub integrations/${LibraryListIntegration}

  LibraryPreviewRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /library/{key}/preview-url
      Target: !Sub integrations/${LibraryListIntegration}

  SessionsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt SessionsFunction.Arn
      PayloadFormatVersion: '2.0'

  SessionsCreateRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /sessions
      Target: !Sub integrations/${SessionsIntegration}

  SessionsByCodeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /sessions/by-code/{accessCode}
      Target: !Sub integrations/${SessionsIntegration}

  SessionsByCodeFinalizeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /sessions/by-code/{accessCode}/finalize
      Target: !Sub integrations/${SessionsIntegration}

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref Env
      AutoDeploy: true

  # --- Lambda permissions ---

  HealthLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref HealthFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  UsersGuestLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref UsersGuestFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  LibraryListLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LibraryListFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  SessionsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref SessionsFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/*

  ApiCustomDomain:
    Type: AWS::ApiGatewayV2::DomainName
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref CustomApiDomainHost
      DomainNameConfigurations:
        - CertificateArn: !Ref ApiCertificateArn
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    Condition: UseCustomDomain
    Properties:
      ApiId: !Ref HttpApi
      DomainName: !Ref ApiCustomDomain
      Stage: !Ref ApiStage

Outputs:
  ApiEndpoint:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}
    Export:
      Name: !Sub ${Env}-chapterquest-api-endpoint
  HttpApiId:
    Value: !Ref HttpApi
  HealthFunctionArn:
    Value: !GetAtt HealthFunction.Arn
