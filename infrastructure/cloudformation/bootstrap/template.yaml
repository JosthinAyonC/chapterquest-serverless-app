AWSTemplateFormatVersion: '2010-09-09'
Description: ChapterQuest bootstrap — GitHub OIDC, deploy role, artifacts bucket

Parameters:
  GitHubOrg:
    Type: String
    Description: GitHub organization or username
  GitHubRepo:
    Type: String
    Description: GitHub repository name
  ArtifactsBucketName:
    Type: String
    Description: Globally unique S3 bucket name for CloudFormation artifacts

Resources:
  ArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ArtifactsBucketName
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03fa02154a509877fd2049c8b34

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub chapterquest-github-deploy-${AWS::AccountId}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub:
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/develop
                  - !Sub repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/master
      Policies:
        - PolicyName: ChapterQuestDeploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:*
                  - s3:*
                  - lambda:*
                  - apigateway:*
                  - dynamodb:*
                  - iam:PassRole
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                  - logs:*
                  - cloudfront:*
                  - acm:DescribeCertificate
                  - acm:ListCertificates
                  - route53:ChangeResourceRecordSets
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                Resource: '*'

Outputs:
  ArtifactsBucketName:
    Value: !Ref ArtifactsBucket
    Export:
      Name: !Sub chapterquest-artifacts-bucket-${AWS::AccountId}
  GitHubDeployRoleArn:
    Value: !GetAtt GitHubDeployRole.Arn
    Export:
      Name: !Sub chapterquest-github-deploy-role-${AWS::AccountId}
