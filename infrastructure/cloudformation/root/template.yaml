AWSTemplateFormatVersion: '2010-09-09'
Description: ChapterQuest root stack — orchestrates nested stacks

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
  TemplatesBaseUrl:
    Type: String
    Description: S3 base URL for nested stack templates
  LambdaArtifactsBucket:
    Type: String
  EnableCustomDomain:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'false'
  DomainName:
    Type: String
    Default: litcircle.com
  HostedZoneId:
    Type: String
    Default: ''
  FrontendOrigin:
    Type: String
    Default: https://placeholder.cloudfront.net
    Description: CORS origin for library CDN; update after first deploy
  LocalDevOrigin:
    Type: String
    Default: ''
    Description: Optional local dev origin for library CDN CORS (dev only)
  LibraryPrefix:
    Type: String
    Default: library/
    Description: S3 prefix for curated PDF catalog

Resources:
  NetworkingStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/networking/template.yaml
      Parameters:
        Env: !Ref Env
        EnableCustomDomain: !Ref EnableCustomDomain
        DomainName: !Ref DomainName
        HostedZoneId: !Ref HostedZoneId

  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/storage/template.yaml
      Parameters:
        Env: !Ref Env
        FrontendOrigin: !Ref FrontendOrigin
        LocalDevOrigin: !Ref LocalDevOrigin
        LibraryPrefix: !Ref LibraryPrefix

  DatabaseStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/database/template.yaml
      Parameters:
        Env: !Ref Env

  ApiStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - StorageStack
      - DatabaseStack
      - NetworkingStack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/api/template.yaml
      Parameters:
        Env: !Ref Env
        LambdaArtifactsBucket: !Ref LambdaArtifactsBucket
        EnableCustomDomain: !Ref EnableCustomDomain
        ApiCertificateArn: !GetAtt NetworkingStack.Outputs.ApiCertificateArn
        CustomApiDomainHost: !GetAtt NetworkingStack.Outputs.ApiDomainName
        UsersTableName: !GetAtt DatabaseStack.Outputs.UsersTableName
        SessionsTableName: !GetAtt DatabaseStack.Outputs.SessionsTableName
        LibraryBucketName: !GetAtt StorageStack.Outputs.LibraryBucketName
        LibraryPrefix: !GetAtt StorageStack.Outputs.LibraryPrefix
        LibraryCdnDomain: !GetAtt StorageStack.Outputs.LibraryCdnDomainName

  FrontendStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - StorageStack
      - NetworkingStack
    Properties:
      TemplateURL: !Sub ${TemplatesBaseUrl}/frontend/template.yaml
      Parameters:
        Env: !Ref Env
        FrontendBucketName: !GetAtt StorageStack.Outputs.FrontendBucketName
        EnableCustomDomain: !Ref EnableCustomDomain
        FrontendCertificateArn: !GetAtt NetworkingStack.Outputs.FrontendCertificateArn
        FrontendDomainName: !GetAtt NetworkingStack.Outputs.FrontendDomainName
        HostedZoneId: !Ref HostedZoneId

Outputs:
  ApiEndpoint:
    Value: !GetAtt ApiStack.Outputs.ApiEndpoint
  WebSocketEndpoint:
    Value: !GetAtt ApiStack.Outputs.WebSocketEndpoint
  FrontendUrl:
    Value: !GetAtt FrontendStack.Outputs.FrontendUrl
  FrontendBucketName:
    Value: !GetAtt StorageStack.Outputs.FrontendBucketName
  LibraryBucketName:
    Value: !GetAtt StorageStack.Outputs.LibraryBucketName
  LibraryPrefix:
    Value: !GetAtt StorageStack.Outputs.LibraryPrefix
  LibraryCdnUrl:
    Value: !GetAtt StorageStack.Outputs.LibraryCdnUrl
  LibraryCdnDomainName:
    Value: !GetAtt StorageStack.Outputs.LibraryCdnDomainName
  CloudFrontDistributionId:
    Value: !GetAtt FrontendStack.Outputs.CloudFrontDistributionId
  CloudFrontDomainName:
    Value: !GetAtt FrontendStack.Outputs.CloudFrontDomainName
