AWSTemplateFormatVersion: '2010-09-09'
Description: ChapterQuest storage — S3 frontend hosting and curated library bucket

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
  FrontendOrigin:
    Type: String
    Description: Allowed CORS origin for library bucket (CloudFront URL or custom domain)
  LibraryPrefix:
    Type: String
    Default: library/
    Description: S3 prefix for curated PDF catalog (admin uploads only)

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Env}-chapterquest-frontend
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  LibraryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Env}-chapterquest-library
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD]
            AllowedOrigins:
              - !Ref FrontendOrigin
            MaxAge: 3600

Outputs:
  FrontendBucketName:
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${Env}-chapterquest-frontend-bucket
  FrontendBucketArn:
    Value: !GetAtt FrontendBucket.Arn
    Export:
      Name: !Sub ${Env}-chapterquest-frontend-bucket-arn
  LibraryBucketName:
    Value: !Ref LibraryBucket
    Export:
      Name: !Sub ${Env}-chapterquest-library-bucket
  LibraryBucketArn:
    Value: !GetAtt LibraryBucket.Arn
    Export:
      Name: !Sub ${Env}-chapterquest-library-bucket-arn
  LibraryPrefix:
    Value: !Ref LibraryPrefix
    Export:
      Name: !Sub ${Env}-chapterquest-library-prefix
