AWSTemplateFormatVersion: '2010-09-09'
Description: ChapterQuest storage — S3 frontend hosting and curated library bucket

Parameters:
  Env:
    Type: String
    AllowedValues: [dev, prod]
  FrontendOrigin:
    Type: String
    Description: Allowed CORS origin for library CDN (CloudFront URL or custom domain)
  LocalDevOrigin:
    Type: String
    Default: ''
    Description: Optional local dev origin (e.g. http://localhost:5173) for library CDN CORS
  LibraryPrefix:
    Type: String
    Default: library/
    Description: S3 prefix for curated PDF catalog (admin uploads only)

Conditions:
  HasLocalDevOrigin: !Not [!Equals [!Ref LocalDevOrigin, '']]

Resources:
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Env}-chapterquest-frontend
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  LibraryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Env}-chapterquest-library
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  LibraryCloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${Env}-chapterquest-library-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  LibraryCorsResponseHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub ${Env}-chapterquest-library-cors
        CorsConfig:
          AccessControlAllowCredentials: false
          AccessControlAllowHeaders:
            Items: ['*']
          AccessControlAllowMethods:
            Items: [GET, HEAD, OPTIONS]
          AccessControlAllowOrigins:
            Items: !If
              - HasLocalDevOrigin
              - [!Ref FrontendOrigin, !Ref LocalDevOrigin]
              - [!Ref FrontendOrigin]
          AccessControlExposeHeaders:
            Items: ['*']
          AccessControlMaxAgeSec: 3600
          OriginOverride: true

  LibraryCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${Env} ChapterQuest library PDF CDN
        HttpVersion: http2and3
        Origins:
          - Id: LibraryS3Origin
            DomainName: !GetAtt LibraryBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt LibraryCloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: LibraryS3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf
          ResponseHeadersPolicyId: !Ref LibraryCorsResponseHeadersPolicy
        ViewerCertificate:
          CloudFrontDefaultCertificate: true

  LibraryBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LibraryBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLibraryCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${LibraryBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${LibraryCloudFrontDistribution}

  ReviewsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${Env}-chapterquest-reviews
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [PUT, GET, HEAD]
            AllowedOrigins: !If
              - HasLocalDevOrigin
              - [!Ref FrontendOrigin, !Ref LocalDevOrigin]
              - [!Ref FrontendOrigin]
            ExposedHeaders: [ETag]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: ExpireReviewVideos
            Status: Enabled
            ExpirationInDays: 30

Outputs:
  FrontendBucketName:
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub ${Env}-chapterquest-frontend-bucket
  FrontendBucketArn:
    Value: !GetAtt FrontendBucket.Arn
    Export:
      Name: !Sub ${Env}-chapterquest-frontend-bucket-arn
  LibraryBucketName:
    Value: !Ref LibraryBucket
    Export:
      Name: !Sub ${Env}-chapterquest-library-bucket
  LibraryBucketArn:
    Value: !GetAtt LibraryBucket.Arn
    Export:
      Name: !Sub ${Env}-chapterquest-library-bucket-arn
  LibraryPrefix:
    Value: !Ref LibraryPrefix
    Export:
      Name: !Sub ${Env}-chapterquest-library-prefix
  LibraryCdnDomainName:
    Value: !GetAtt LibraryCloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${Env}-chapterquest-library-cdn-domain
  LibraryCdnUrl:
    Value: !Sub https://${LibraryCloudFrontDistribution.DomainName}
    Export:
      Name: !Sub ${Env}-chapterquest-library-cdn-url
  ReviewsBucketName:
    Value: !Ref ReviewsBucket
    Export:
      Name: !Sub ${Env}-chapterquest-reviews-bucket
  ReviewsBucketArn:
    Value: !GetAtt ReviewsBucket.Arn
    Export:
      Name: !Sub ${Env}-chapterquest-reviews-bucket-arn
